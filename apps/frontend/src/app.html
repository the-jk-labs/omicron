<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="any" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // Apply the theme before first paint to avoid a flash. An explicit
      // "light"/"dark" choice wins; otherwise ("system" or unset) follow the OS.
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var dark =
            stored === "light" || stored === "dark"
              ? stored === "dark"
              : window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-background text-foreground">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
