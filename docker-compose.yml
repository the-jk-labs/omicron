




# Omicron — single-command self-hostable federated blog.
#   docker compose up -d --build      (no .env editing required)
#
# On first boot the `init-secrets` service generates a random Postgres password
# and session secret into the `secrets` volume; Postgres and the backend read
# them from files, so no credentials are ever hardcoded or hand-typed.
#
# Upgrades:
#   git pull && docker compose up -d --build
# Migrations run automatically on backend startup; data lives in the `pgdata`
# volume and secrets in the `secrets` volume, so upgrades never lose content.

services:
  # Generates any missing secrets once, then exits. Both postgres and backend
  # depend on it completing, so the files always exist before they start.
  init-secrets:
    image: alpine:3
    command:
      - sh
      - -c
      - |
        set -e
        for name in db_password session_secret; do
          f="/secrets/$$name"
          if [ ! -s "$$f" ]; then
            head -c 32 /dev/urandom | od -An -tx1 | tr -d ' \n' > "$$f"
            chmod 600 "$$f"
            echo "generated $$name"
          fi
        done
    volumes:
      - secrets:/secrets

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      init-secrets:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omicron}
      POSTGRES_DB: ${POSTGRES_DB:-omicron}
      # Password comes from the generated secret file, not the environment.
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omicron} -d ${POSTGRES_DB:-omicron}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Durable, shared state for the rate limiter, Fedify's KV + message queue, and
  # the app job queue. Bundled so the container path is durable out of the box
  # (undelivered federation activities and queued jobs survive a restart) with no
  # config editing; the backend picks it up via REDIS_URL below. Not published on
  # the host — only the backend reaches it over the compose network.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Light persistence so the queue survives a restart of Redis itself.
    command: ["redis-server", "--save", "60", "1", "--appendonly", "no"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./apps/backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init-secrets:
        condition: service_completed_successfully
    environment:
      # Zero-config default: DATABASE_URL is assembled in-app from these parts +
      # the generated password file, and SESSION_SECRET is read from its file.
      # Setting DATABASE_URL / SESSION_SECRET / POSTGRES_PASSWORD in .env still
      # overrides them (backward-compatible with existing deployments).
      DATABASE_URL: ${DATABASE_URL:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      POSTGRES_USER: ${POSTGRES_USER:-omicron}
      POSTGRES_DB: ${POSTGRES_DB:-omicron}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      SESSION_SECRET_FILE: /run/secrets/session_secret
      APP_DOMAIN: ${APP_DOMAIN:-localhost:5173}
      FEDERATION_ENABLED: ${FEDERATION_ENABLED:-false}
      # Durable, shared queues + rate limits via the bundled redis service.
      # Override or blank it out to run the backend against in-process memory.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 8000
      UPLOADS_DIR: /data/uploads
      # App-owned writable state (e.g. a web-UI-rotated session secret). Kept
      # separate from the read-only bootstrap `secrets` volume.
      STATE_DIR: /data/state
      # Caddy's admin API (internal network only) + the Caddyfile it loaded, so
      # the admin-panel AI-scraper-shield toggle can reload routing at runtime.
      CADDY_ADMIN_URL: ${CADDY_ADMIN_URL:-http://caddy:2019}
      CADDYFILE_PATH: /etc/caddy/Caddyfile
    volumes:
      # Persist user-uploaded media (avatars) across restarts/upgrades.
      - uploads:/data/uploads
      - state:/data/state
      - secrets:/run/secrets:ro
      # Read-only view of the real Caddyfile: the scraper-shield toggle reads it,
      # swaps one upstream line, and reloads it through Caddy's admin API.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    ports:
      # Loopback only: Caddy reaches the backend over the compose network and is
      # the sole public entrypoint (federation, API, TLS all flow through it). This
      # mapping is just for local debugging — never expose the API on the host's
      # public interface, which would bypass TLS and the single-entrypoint model.
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./apps/frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:8000}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME:-Omicron}
      APP_DOMAIN: ${APP_DOMAIN:-localhost:5173}
      PORT: 3000
      # Behind Caddy the app is reached over TLS on the public domain; trust the
      # proxy's forwarded headers so SvelteKit reconstructs the correct external
      # origin (https + host) and the real client IP for redirects/links.
      PROTOCOL_HEADER: x-forwarded-proto
      HOST_HEADER: x-forwarded-host
      ADDRESS_HEADER: x-forwarded-for
      # Exactly one trusted proxy (Caddy) sits in front, so getClientAddress()
      # reads the client IP that Caddy appended — not a value the client may have
      # spoofed. Required whenever ADDRESS_HEADER is x-forwarded-for; without it
      # per-IP rate limiting keys on the wrong hop.
      XFF_DEPTH: "1"
    ports:
      # Loopback only: production traffic goes through Caddy. Exposed on the host
      # just for local debugging, not on the public interface.
      - "127.0.0.1:5173:3000"

  # AI-scraper shield. A proof-of-work challenge that browser-like scrapers
  # can't pass but real browsers solve in ~1s. It always runs but only sits in
  # the request path when an admin enables protection (Admin → Security), which
  # makes Caddy route the app branch here instead of straight to the frontend.
  # Federation and the API never pass through it. Its signing key is ephemeral,
  # so a restart re-challenges readers once — a fine trade for zero config.
  anubis:
    # Pinned to a specific release so an upgrade is a deliberate bump, never a
    # silent breaking change on the next pull. Check for newer stable tags at
    # https://github.com/TecharoHQ/anubis/releases before raising this.
    image: ghcr.io/techarohq/anubis:v1.25.0
    restart: unless-stopped
    depends_on:
      - frontend
    environment:
      BIND: ":8080"
      TARGET: "http://frontend:3000"
      METRICS_BIND: ":9090"
      POLICY_FNAME: "/data/cfg/botPolicy.yaml"
      # PoW cost. 4 is Anubis's default — light on real browsers.
      DIFFICULTY: "4"
      # Let the app serve /robots.txt (the botPolicy ALLOWs that path straight
      # through). The admin Discoverability page is the single source of truth for
      # robots.txt + the sitemap link, and its indexing toggle must stay
      # authoritative even with the shield on — so Anubis must NOT shadow the path
      # with its own generated robots.txt. AI scrapers ignore robots.txt anyway;
      # the PoW wall, not robots.txt, is what actually holds them back.
      SERVE_ROBOTS_TXT: "false"
      # Strip the private compose-network hops (Caddy, Anubis) from
      # X-Forwarded-For so the frontend — one extra hop back — still reads the
      # real public client IP under XFF_DEPTH=1. Per-IP rate limiting stays
      # accurate whether or not protection is on. Pinned (also the default).
      XFF_STRIP_PRIVATE: "true"
      # Let link-preview crawlers read <meta og:*> without a challenge, so shared
      # post links still render cards.
      OG_PASSTHROUGH: "true"
      OG_EXPIRY_TIME: "24h"
    volumes:
      - ./botPolicy.yaml:/data/cfg/botPolicy.yaml:ro

  # Public entrypoint: terminates TLS and reverse-proxies to frontend/backend.
  # Obtains Let's Encrypt certificates on demand for the instance's own domain
  # (gated by the backend), so going public needs only a DNS record — no certs
  # to request, no config files to edit. See Caddyfile for the routing.
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  state:
  secrets:
  redis_data:
  caddy_data:
  caddy_config:
