# Omicron — single-command self-hostable federated blog.
#   cp .env.example .env && docker compose up -d --build
#
# Upgrades:
#   git pull && docker compose up -d --build
# Migrations run automatically on backend startup; data lives in the
# `pgdata` volume so upgrades never lose content.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./apps/backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_DOMAIN: ${APP_DOMAIN}
      FEDERATION_ENABLED: ${FEDERATION_ENABLED}
      SESSION_SECRET: ${SESSION_SECRET}
      PORT: ${PORT}
      UPLOADS_DIR: /data/uploads
    volumes:
      # Persist user-uploaded media (avatars) across restarts/upgrades.
      - uploads:/data/uploads
    ports:
      # Exposed so other fediverse servers can reach /.well-known and /users.
      - "8000:8000"

  frontend:
    build: ./apps/frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL}
      PUBLIC_APP_NAME: ${PUBLIC_APP_NAME}
      APP_DOMAIN: ${APP_DOMAIN}
      PORT: 3000
    ports:
      - "5173:3000"

volumes:
  pgdata:
  uploads:
